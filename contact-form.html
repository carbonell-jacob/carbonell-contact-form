<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <title>Contact Us</title>
  </head>
  <body class="bg-light">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <form class="container border p-4 m-auto my-5 shadow bg-white rounded">
      <h1 class="display-2 text-center mb-4 fw-bold text-primary">
        Contact Us
      </h1>

      <!-- Full Name -->
      <div class="row">
        <div class="col-md mb-3">
          <label for="fullnameInput" class="form-label fw-bold"
            >Full Name:</label
          >

          <input
            id="fullnameInput"
            type="text"
            class="form-control form-control-lg"
            placeholder="Enter full name..."
            aria-describedby="fullnameHelp"
          />

          <div id="fullnameHelp" class="form-text">
            Enter your first and last name.
          </div>
        </div>

        <!-- Email -->
        <div class="col-md">
          <label for="emailInput" class="form-label fw-bold">Email:</label>

          <input
            id="emailInput"
            type="email"
            class="form-control form-control-sm"
            placeholder="Enter email address..."
            aria-describedby="emailHelp"
          />

          <div id="emailHelp" class="form-text">
            We will not share your email.
          </div>
        </div>
      </div>

      <!-- Message -->
      <div class="mb-3 mt-3">
        <label for="messageInput" class="form-label fw-bold">Message:</label>

        <textarea
          id="messageInput"
          class="form-control"
          rows="5"
          placeholder="Enter message..."
          aria-describedby="messageHelp"
        ></textarea>

        <div id="messageHelp" class="form-text">
          Be clear and include necessary details.
        </div>
      </div>

      <!-- Preferred Contact -->
      <div class="mb-3 mt-3">
        <label class="form-label d-block fw-bold">Preferred Contact:</label>

        <div class="form-check form-check-inline">
          <input class="form-check-input" type="checkbox" id="contactEmail" />
          <label class="form-check-label" for="contactEmail">Email</label>
        </div>

        <div class="form-check form-check-inline">
          <input class="form-check-input" type="checkbox" id="contactPhone" />
          <label class="form-check-label" for="contactPhone">Phone</label>
        </div>

        <div class="form-check form-check-inline">
          <input
            class="form-check-input"
            type="checkbox"
            id="contactWhatsapp"
          />
          <label class="form-check-label" for="contactWhatsapp">WhatsApp</label>
        </div>
      </div>

      <!-- Favorite Color -->
      <div class="mb-3 mt-3">
        <label for="colorInput" class="form-label fw-bold"
          >Favorite Color:</label
        >

        <input
          id="colorInput"
          type="color"
          class="form-control form-control-color w-25"
          value="#90d5ff"
        />
      </div>

      <!-- User ID -->
      <div class="mb-3 mt-3">
        <label for="userIdInput" class="form-label fw-bold">User ID:</label>

        <input
          id="userIdInput"
          type="text"
          class="form-control"
          value="1234"
          disabled
        />
      </div>

      <!-- Account Type -->
      <div class="mb-3 mt-3">
        <label for="accountTypeInput" class="form-label fw-bold">
          Account Type:
        </label>

        <input
          id="accountTypeInput"
          type="text"
          class="form-control-plaintext"
          value="Student"
          disabled
          readonly
        />
      </div>

      <button type="submit" class="btn btn-success mt-3">Submit</button>
    </form>
  </body>
</html>
